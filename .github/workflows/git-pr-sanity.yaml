name: Git PR Sanity
on:
  workflow_call:

jobs:
  git-pr-sanity:
    runs-on: ubuntu-22.04
    steps:
      - name: Process stale PRs
        uses: Sonia-corporation/stale@3.1.0
        with:
          pull-request-days-before-close: 2555
  git-artifact-cleanup:
    runs-on: ubuntu-22.04
    steps:
      - uses: major0/gh-artifact-cleanup@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: true # defaults to false
